model:
  vocab_size: 50257
  context_length: 128
  d_model: 128
  num_layers: 4
  num_heads: 4
  num_kv_heads: 2
  dropout: 0.0
  gradient_checkpointing: false

data:
  train_path: data/processed/train.bin
  validation_path: data/processed/validation.bin
  tokenizer_dir: tokenizer
  sequence_length: 128
  num_workers: 0

training:
  output_dir: runs/tiny
  device: auto
  seed: 1337
  micro_batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 10000
  learning_rate: 0.0006
  min_learning_rate: 0.00006
  warmup_steps: 200
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  precision: auto
  compile: false
  eval_every: 250
  eval_batches: 20
  checkpoint_every: 500

monitoring:
  log_every: 10
  tensorboard: true
  wandb_project: null
  profile_every: null
  cuda_memory_snapshot: false

